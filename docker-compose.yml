version: "3.9"

services:
  sqlserver:
    image: ${SQLSERVER_IMAGE}
    container_name: ${SQLSERVER_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      ACCEPT_EULA: ${SQLSERVER_ACCEPT_EULA}
      MSSQL_PID: ${SQLSERVER_PID}
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
    ports:
      - "${SQLSERVER_HOST_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - beacon_net

  minio:
    image: ${MINIO_IMAGE}
    container_name: ${MINIO_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - beacon_net

volumes:
  sqlserver_data:
  minio_data:

networks:
  beacon_net:
    driver: bridge
