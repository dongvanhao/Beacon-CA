services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: beacon-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "BeaconDev@2024"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"BeaconDev@2024\" -Q 'SELECT 1' -No -b" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: beacon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beacon-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override connection string — ASP.NET Core tự đọc biến dạng này
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BeaconDb;User Id=sa;Password=BeaconDev@2024;TrustServerCertificate=True"
      # JWT — dùng env var thay vì appsettings (user-secrets không chạy trong Docker)
      JwtSettings__SecretKey: "beacon-super-secret-key-for-dev-at-least-32-chars"
      # Seed SuperAdmin — chỉ dùng cho dev, override bằng secrets manager trên production
      SeedAdmin__Email: "superadmin@beacon.com"
      SeedAdmin__Password: "Admin@123456"
      # MinIO — override endpoint cho Docker network
      MinIO__Endpoint: "http://minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy # Chờ SQL Server healthy rồi mới start
      minio:
        condition: service_healthy

volumes:
  sqlserver_data:
  minio_data:
