services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: beacon-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "BeaconDev@2024"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"BeaconDev@2024\" -Q 'SELECT 1' -No -b" ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beacon-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override connection string — ASP.NET Core tự đọc biến dạng này
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BeaconDb;User Id=sa;Password=BeaconDev@2024;TrustServerCertificate=True"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy # Chờ SQL Server healthy rồi mới start

volumes:
  sqlserver_data:
