services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: beacon-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -Q 'SELECT 1' -No -b" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: beacon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beacon-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override connection string — ASP.NET Core tự đọc biến dạng này
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BeaconDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      # JWT — dùng env var thay vì appsettings (user-secrets không chạy trong Docker)
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      # Seed SuperAdmin — chỉ dùng cho dev, override bằng secrets manager trên production
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD}"
      # MinIO — Endpoint là internal Docker network, PublicEndpoint là host client dùng để tải ảnh.
      # Với điện thoại thật, đặt HOST_IP trong .env thành LAN IP của máy chạy Docker, vd: 192.168.1.139.
      MinIO__Endpoint: "http://minio:9000"
      MinIO__PublicEndpoint: "http://${HOST_IP}:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD}"
      # Firebase FCM — để trống sẽ skip FCM (notification vẫn hoạt động qua SignalR)
      Firebase__CredentialJson: "${FIREBASE_CREDENTIAL_JSON}"
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy # Chờ SQL Server healthy rồi mới start
      minio:
        condition: service_healthy

volumes:
  sqlserver_data:
  minio_data:
  dataprotection_keys:
