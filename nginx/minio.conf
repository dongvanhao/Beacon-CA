log_format signed_s3 '$remote_addr "$request" status=$status host="$host" http_host="$http_host" '
                     'upstream="$upstream_addr" xfh="$http_x_forwarded_host" xfp="$http_x_forwarded_proto"';

server {
    listen 9000;
    server_name _;

    access_log /var/log/nginx/access.log signed_s3;
    client_max_body_size 0;
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;

        # S3 presigned URLs include host in the signature. MinIO must receive
        # the exact same host the API used when signing.
        # Giá trị này được inject lúc container start qua envsubst (xem docker-compose).
        # Dev: set MINIO_PUBLIC_HOST=r14989tt-9000.asse.devtunnels.ms trong .env
        # Prod: set MINIO_PUBLIC_HOST=storage.yourdomain.com trong .env
        proxy_set_header Host ${MINIO_PUBLIC_HOST};
        proxy_set_header X-Forwarded-Host ${MINIO_PUBLIC_HOST};
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
}
